<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Volen Atieno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">
    <header class="bg-white border-bottom shadow-sm">
        <nav class="container navbar navbar-expand-lg navbar-light py-3">
            <a class="navbar-brand fw-bold" href="home.html">Volen Atieno</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="Blog.html">Blog</a></li>
                    <li class="nav-item"><a class="btn btn-primary btn-sm" href="contactme.html">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container py-5">
        <div class="row g-4">
            <div class="col-md-6">
                <h1 class="h3 mb-4">Get In Touch</h1>
                <form action="https://formspree.io/f/xvzjagqz" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input id="name" name="name" type="text" class="form-control" placeholder="Your name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea id="message" name="message" class="form-control" rows="5"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
            <div class="col-md-6">
                <div class="bg-white rounded-4 shadow-sm p-4">
                    <h4>Contact Info</h4>
                    <p class="mb-1"><strong>Email:</strong> volenatieno346@example.com</p>
                    <p class="mb-1"><strong>Location:</strong> Nairobi, Kenya</p>
                    <p class="mb-0">I'll usually reply within 1-2 business days.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-4">
        <div class="container text-center text-muted">© VOLEN — portfolio</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
